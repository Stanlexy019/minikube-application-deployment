apiVersion: apps/v1
kind: Deployment
metadata:
  name:  frontend-deployment
  namespace: os-namespace
  labels:
    tier: web
spec:
  selector:
    matchLabels:
      tier: web
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        tier: web
    spec:
      containers:
      - name:  frontend-container
        image: stanley019/kube-frontend:v1
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 5
        
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 5
       
        ports:
         - name: frontend-port
           protocol: TCP
           containerPort:  80
   
        